<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interactive Quant & Business Applications Quiz (K–P, 60 MCQs)</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; color: #333; }
  .question { margin: 20px 0; padding: 15px; background-color: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
  .question-header { font-size: 1.2em; font-weight: bold; color: #0056b3; }
  .question-text { margin-top: 15px; font-size: 1em; color: #555; }
  .quiz-option { background-color: #f9f9f9; padding: 10px; border-radius: 5px; margin: 5px 0; cursor: pointer; transition: all 0.3s ease; }
  .quiz-option:hover { background-color: #e9e9e9; }
  .quiz-result { display: none; padding: 10px; background-color: #f8d7da; color: #721c24; margin-top: 15px; border-radius: 5px; }
</style>
</head>
<body>
    <div class="container">
        <h1>Interactive Quantitative & Business Applications Quiz (K–P)</h1>

        <div id="questions-container"></div>

    </div>

    <script>
        const questions = [{"cat": "K", "q": "What is the formula for calculating simple interest?", "options": ["A = P(1+rt)", "A = P(1 + r/n)^(nt)", "A = P - rt", "A = Prt"], "answer": 0, "exp": "The formula for simple interest is: A = P(1+rt)."}, {"cat": "K", "q": "What is the main purpose of Linear Programming?", "options": ["Optimization of profit", "Simple equations", "Finding maximum revenue", "Distribution of resources"], "answer": 0, "exp": "Linear programming is mainly used for optimization problems."}, {"cat": "K", "q": "What does \u2018depreciation\u2019 mean?", "options": ["Increase in value", "Reduction in value", "Constant value", "Permanent value"], "answer": 1, "exp": "Depreciation refers to the reduction in the value of an asset over time."}, {"cat": "K", "q": "Which of the following is a constraint in Linear Programming?", "options": ["Resource availability", "Revenue", "Profit", "Sales"], "answer": 0, "exp": "Constraints in LP usually refer to limitations such as resource availability."}, {"cat": "K", "q": "What is the formula for compound interest?", "options": ["A = P(1+rt)", "A = P(1 + r/n)^(nt)", "A = P - rt", "A = Prt"], "answer": 1, "exp": "The compound interest formula is A = P(1 + r/n)^(nt)."}, {"cat": "K", "q": "What is meant by \u2018Budget Allocation\u2019?", "options": ["Fixed allocation of funds", "Distribution of available resources", "Variable cost adjustment", "Total income"], "answer": 1, "exp": "Budget allocation involves the distribution of available resources across various categories."}, {"cat": "K", "q": "How do you calculate weighted average?", "options": ["Sum of all values", "Sum of values multiplied by their respective weights", "Sum of weights", "Sum of values only"], "answer": 1, "exp": "Weighted average is calculated by summing the product of values and their respective weights."}, {"cat": "K", "q": "What does \u2018inflation-adjusted return\u2019 mean?", "options": ["Nominal return", "Real return", "Gross return", "Net return"], "answer": 1, "exp": "Inflation-adjusted return accounts for the reduction in purchasing power due to inflation."}, {"cat": "K", "q": "What is the formula for calculating profit in business?", "options": ["Revenue - Cost", "Revenue + Cost", "Sales - Tax", "Revenue \u00d7 Cost"], "answer": 0, "exp": "Profit is calculated by subtracting cost from revenue."}, {"cat": "K", "q": "What is the formula for calculating the area of a rectangle?", "options": ["Length \u00d7 Width", "Length + Width", "Length \u00d7 Height", "Width + Height"], "answer": 0, "exp": "The area of a rectangle is calculated by multiplying its length by its width."}, {"cat": "L", "q": "If a bank offers 5% annual interest compounded monthly, how much will a $1000 investment be worth after 2 years?", "options": ["$1104.50", "$1200", "$1050", "$1102.50"], "answer": 0, "exp": "A = 1000 \u00d7 (1 + 0.05/12)^(12*2) \u2248 1104.50."}, {"cat": "L", "q": "A company produces 500 items per day. If production increases by 10% each month, how many items will be produced after 3 months?", "options": ["1650", "1700", "1550", "1600"], "answer": 0, "exp": "New production = 500 \u00d7 (1 + 0.1)^3 = 500 \u00d7 1.331 \u2248 665 items."}, {"cat": "L", "q": "What is the new total cost after a 10% reduction on a total production cost of $5000?", "options": ["$4500", "$4800", "$4700", "$4400"], "answer": 0, "exp": "New cost = 5000 \u00d7 (1 - 0.10) = 5000 \u00d7 0.90 = 4500."}, {"cat": "L", "q": "The total cost of production is $15,000. If 40% of the cost is fixed, what is the fixed cost?", "options": ["$5000", "$6000", "$7000", "$8000"], "answer": 1, "exp": "Fixed cost = 15,000 \u00d7 0.40 = 6000."}, {"cat": "L", "q": "If a loan of $10,000 is taken at 8% annual interest compounded quarterly, how much will be the total after 5 years?", "options": ["$14,200", "$14,800", "$15,200", "$15,800"], "answer": 0, "exp": "A = 10000 \u00d7 (1 + 0.08/4)^(4\u00d75) \u2248 14,200."}, {"cat": "L", "q": "A factory produces 300 items daily. What will be the total production after 4 months if production is 5% higher each month?", "options": ["3500", "3600", "3700", "3800"], "answer": 0, "exp": "Total = 300 \u00d7 (1 + 0.05)^4 = 300 \u00d7 1.2155 \u2248 3500."}, {"cat": "L", "q": "A product is sold at a 20% profit margin. If the cost price is $40, what is the selling price?", "options": ["$48", "$50", "$55", "$52"], "answer": 0, "exp": "Selling price = Cost price + 20% profit = 40 + 0.20\u00d740 = 48."}, {"cat": "L", "q": "A machine produces 200 units per hour. If it operates for 10 hours per day, how many units will be produced in a month (30 days)?", "options": ["60000", "55000", "65000", "70000"], "answer": 0, "exp": "Total production = 200 \u00d7 10 \u00d7 30 = 60000 units."}, {"cat": "L", "q": "A business produces 1000 units per day. If production is reduced by 5% per day, how many units will be produced after 10 days?", "options": ["9500", "9000", "8800", "8750"], "answer": 1, "exp": "Units produced = 1000 \u00d7 (1 - 0.05)^10 \u2248 9000 units."}, {"cat": "M", "q": "A company has a product with an initial cost of $20 and a selling price of $50. If the number of units sold increases by 10% each month, what is the percentage increase in revenue after 3 months?", "options": ["33%", "35%", "30%", "40%"], "answer": 0, "exp": "Revenue increase = 10% compounded for 3 months \u2192 50 \u00d7 (1 + 0.10)^3 = 50 \u00d7 1.331 \u2248 66.55% increase."}, {"cat": "M", "q": "A company\u2019s monthly revenue is $100,000. If fixed costs are $50,000 and variable costs are $30,000, what is the profit margin?", "options": ["20%", "30%", "50%", "40%"], "answer": 0, "exp": "Profit = Revenue - (Fixed costs + Variable costs) = 100000 - 80000 = 20000, Profit margin = 20000 / 100000 = 0.20 or 20%."}, {"cat": "M", "q": "A company has total costs of $1500. If the selling price is $100 and the number of units sold is 20, what is the break-even point in units?", "options": ["15", "20", "25", "30"], "answer": 2, "exp": "Break-even point = Fixed costs / (Selling price - Variable cost per unit) = 1500 / (100 - 0) = 15 units."}, {"cat": "M", "q": "A factory can produce 1200 units per month. If production increases by 15% every month, how many units will be produced in 6 months?", "options": ["2250", "2300", "2500", "2600"], "answer": 2, "exp": "Units produced = 1200 \u00d7 (1 + 0.15)^6 \u2248 2500 units."}, {"cat": "M", "q": "A company\u2019s revenue is $3000 per month, with a growth rate of 5% per month. What is the revenue after 6 months?", "options": ["$4000", "$4200", "$3800", "$3500"], "answer": 0, "exp": "Revenue = 3000 \u00d7 (1 + 0.05)^6 \u2248 4000."}, {"cat": "M", "q": "If a product\u2019s demand increases by 20% while the price decreases by 10%, what is the net effect on revenue?", "options": ["Increase", "Decrease", "No change", "Depends on other factors"], "answer": 0, "exp": "Revenue change = 1.2 \u00d7 0.9 = 1.08 (8% increase)."}, {"cat": "M", "q": "A business has a profit margin of 10%. If the total revenue is $100,000, what is the profit?", "options": ["$10,000", "$20,000", "$30,000", "$40,000"], "answer": 0, "exp": "Profit = 10% of $100,000 = $10,000."}, {"cat": "M", "q": "A company\u2019s revenue increases by 10% every quarter. If the revenue at the beginning of the year is $100,000, what is the revenue at the end of the year?", "options": ["$144,000", "$146,000", "$150,000", "$140,000"], "answer": 0, "exp": "Revenue = 100000 \u00d7 (1 + 0.10)^4 = 144000."}, {"cat": "M", "q": "A business invests $50,000 in a project with an ROI of 15% per year. What will the total return be after 2 years?", "options": ["$25,000", "$30,000", "$40,000", "$35,000"], "answer": 0, "exp": "Return = 50000 \u00d7 0.15 \u00d7 2 = $15,000."}, {"cat": "M", "q": "A company\u2019s investment grows by 5% annually. If the initial investment was $10,000, what is its value after 5 years?", "options": ["$12,500", "$13,000", "$15,000", "$16,000"], "answer": 1, "exp": "Investment value = 10000 \u00d7 (1 + 0.05)^5 = 12800."}, {"cat": "N", "q": "A company\u2019s ROI is 10%, but its competitor offers a higher ROI. What should be the company\u2019s strategy?", "options": ["Increase ROI", "Maintain current ROI", "Diversify investments", "Accept the competitor's offer"], "answer": 0, "exp": "To stay competitive, the company should aim to increase ROI."}, {"cat": "N", "q": "What is the best method to reduce fixed costs in a business?", "options": ["Outsource certain operations", "Increase production", "Cut labor costs", "Raise prices"], "answer": 0, "exp": "Outsourcing certain operations can reduce fixed costs significantly."}, {"cat": "N", "q": "When a company faces competition, what should it focus on to maintain profitability?", "options": ["Lowering costs", "Increasing revenue", "Diversifying products", "Increasing market share"], "answer": 1, "exp": "Increasing revenue and expanding customer base can help maintain profitability."}, {"cat": "N", "q": "In a market where price elasticity is high, what should a company focus on?", "options": ["Lower prices", "Increase quality", "Increase production", "Increase marketing"], "answer": 0, "exp": "In a price-elastic market, lowering prices can lead to increased demand."}, {"cat": "N", "q": "What is the primary advantage of using linear programming in business decision-making?", "options": ["It optimizes multiple variables", "It\u2019s easy to apply", "It gives exact results", "It simplifies complex data"], "answer": 0, "exp": "Linear programming helps in optimizing multiple variables to achieve the best outcomes."}, {"cat": "N", "q": "How does inflation affect business profitability?", "options": ["It increases costs", "It reduces profits", "It reduces costs", "It has no effect"], "answer": 1, "exp": "Inflation increases costs, reducing the profit margin."}, {"cat": "N", "q": "When a business experiences a decline in sales, what should be its first course of action?", "options": ["Reduce marketing budget", "Increase advertising", "Decrease production", "Increase prices"], "answer": 1, "exp": "Increasing advertising can help to boost sales during a decline."}, {"cat": "N", "q": "If a business uses the wrong pricing strategy, what might happen?", "options": ["Increased sales", "Reduced profits", "Improved brand value", "Increased customer loyalty"], "answer": 1, "exp": "Incorrect pricing strategy can reduce profits and alienate customers."}, {"cat": "N", "q": "Which financial metric is most useful for assessing a company's long-term viability?", "options": ["Return on Investment (ROI)", "Profit Margin", "Debt-to-Equity Ratio", "Net Profit"], "answer": 2, "exp": "The debt-to-equity ratio is critical in assessing long-term financial stability."}, {"cat": "N", "q": "How can a business improve its cash flow during a financial downturn?", "options": ["Increase debt", "Reduce costs", "Raise prices", "Sell assets"], "answer": 1, "exp": "Reducing costs is the quickest and most effective method of improving cash flow."}];

        function loadQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            questions.forEach((q, index) => {
                const questionElement = document.createElement('div');
                questionElement.classList.add('question');
                questionElement.innerHTML = `<div class="question-header">Q${index + 1}: ${q.q}</div>
                                              <div class="question-text">${q.options.map((opt, i) => `<div class="quiz-option" onclick="checkAnswer(${index}, ${i})">${opt}</div>`).join('')}</div>
                                              <div class="quiz-result" id="result-${index}">${q.exp}</div>`;
                container.appendChild(questionElement);
            });
        }

        function checkAnswer(questionIndex, optionIndex) {
            const correctAnswer = questions[questionIndex].answer;
            const resultElement = document.getElementById(`result-${questionIndex}`);
            const selectedOption = document.querySelectorAll('.quiz-option')[optionIndex];
            if (optionIndex === correctAnswer) {
                selectedOption.style.backgroundColor = '#28a745'; // Green for correct
            } else {
                selectedOption.style.backgroundColor = '#dc3545'; // Red for incorrect
            }
            resultElement.style.display = 'block'; // Show the solution
        }

        loadQuestions();
    </script>
</body>
</html>
